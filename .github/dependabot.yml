version: 2
updates:
  # Actualizaciones para GitHub Actions (.github/workflows)
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"

  # Dependencias de npm en la raíz del proyecto
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"

  # Dependencias de npm en el frontend
  - package-ecosystem: "npm"
    directory: "/frontend"
    schedule:
      interval: "weekly"

  # Dependencias de Poetry en el backend
  - package-ecosystem: "poetry"
    directory: "/backend"
    schedule:
      interval: "weekly"

  # Dependencias de Pip (requirements.txt) en keras-api
  - package-ecosystem: "pip"
    directory: "/keras-api"
    schedule:
      interval: "weekly"

  # Dependencias de Docker (docker-compose.yml en la raíz)
  - package-ecosystem: "docker"
    directory: "/"
    schedule:
      interval: "weekly"

  # Dependencias de Docker (Dockerfile del backend)
  - package-ecosystem: "docker"
    directory: "/backend"
    schedule:
      interval: "weekly"

  # Dependencias de Docker (Dockerfile del frontend)
  - package-ecosystem: "docker"
    directory: "/frontend"
    schedule:
      interval: "weekly"

  # Dependencias de Docker (Dockerfile de keras-api)
  - package-ecosystem: "docker"
    directory: "/keras-api"
    schedule:
      interval: "weekly"

  # Dependencias de Ruby (Fastlane) en el frontend
  - package-ecosystem: "bundler"
    directory: "/frontend"
    schedule:
      interval: "weekly"

  # Dependencias de Gradle en Android
  - package-ecosystem: "gradle"
    directory: "/frontend/android"
    schedule:
      interval: "weekly"

